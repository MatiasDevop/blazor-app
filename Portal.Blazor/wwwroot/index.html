    <script>
      function renderRecaptcha(dotNetObj, selector, sitekey) {
        return grecaptcha
          .render(selector, {
            sitekey: sitekey,
            callback: (response) => {
              dotNetObj.invokeMethodAsync("CallbackOnSuccess", response);
            },
            "expired-callback": () => {
              dotNetObj.invokeMethodAsync("CallbackOnExpired");
            },
          })
          ?.toString();
      }

      function resetRecaptcha(id) {
        if (!id) return;
        grecaptcha.reset(Number.parseInt(id));
      }

      function getResponse(widgetId) {
        return grecaptcha.getResponse(widgetId);
      }

      function toggleOnUnload() {
        return;
        if (window.onbeforeunload) window.onbeforeunload = null;
        else window.onbeforeunload = () => "Your work will be lost.";
      }

      function downloadFile(fileName, fileData) {
        let link = document.createElement("a");
        link.download = fileName;
        link.href = fileData;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
    </script>
